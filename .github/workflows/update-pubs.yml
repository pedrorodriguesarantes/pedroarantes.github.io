name: Update publications from DBLP

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of every month
  workflow_dispatch: {}    # allows manual run from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate publications.html
        run: python scripts/build_pubs.py

      - name: Commit if changed
        run: |
          git config user.name "pubs-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet publications.html missing_preprints.md oa_cache.json; then
            git add publications.html missing_preprints.md oa_cache.json
            git commit -m "chore: update publications from DBLP"
            git push
          else
            echo "No changes."
          fi
